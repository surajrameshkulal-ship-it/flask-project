<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>To-Do Page</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }

        .todo-container {
            width: 100%;
            max-width: 500px;
            padding: 30px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-top: 0;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-size: 16px;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            color: white;
            background-color: #2563eb;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }

        .success {
            color: #166534;
            background-color: #dcfce7;
        }

        .error {
            color: #991b1b;
            background-color: #fee2e2;
        }
    </style>
</head>

<body>
    <div class="todo-container">
        <h1>Create To-Do Item</h1>

        {% if success %}
            <div class="message success">
                {{ success }}
            </div>
        {% endif %}

        {% if error %}
            <div class="message error">
                {{ error }}
            </div>
        {% endif %}

        <form action="/submittodoitem" method="POST">
    
            <div class="form-group">
                <label for="itemUuid">Item UUID</label>
                <input
                type="text"
                id="itemUuid"
                name="itemUuid"
                placeholder="Enter item UUID"
                required
                >
            </div>
            <div class="form-group">
                <label for="itemId">Item ID</label>
                <input
                    type="text"
                    id="itemId"
                    name="itemId"
                    placeholder="Enter item ID"
                    required
                >
            </div>
           
            <div class="form-group">
                <label for="itemHash">Item Hash</label>
                <input
                    type="text"
                    id="itemHash"
                    name="itemHash"
                    placeholder="Enter item hash"
                    required
                >
            </div>
            <div class="form-group">
            
                <label for="itemName">Item Name</label>

                <input
                    type="text"
                    id="itemName"
                    name="itemName"
                    placeholder="Enter item name"
                    required
                >
            </div>

            <div class="form-group">
                <label for="itemDescription">
                    Item Description
                </label>

                <textarea
                    id="itemDescription"
                    name="itemDescription"
                    placeholder="Enter item description"
                    required
                ></textarea>
            </div>

            <button type="submit">
                Add To-Do Item
            </button>
        </form>
    </div>
</body>
</html>
